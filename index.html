<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมวิ่งเก็บเหรียญ สไตล์มาริโอ้</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #87CEEB; /* สีฟ้าท้องฟ้า */
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #gameContainer {
            text-align: center;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>⬅️ ➡️ เดิน | ⬆️ กระโดด | เหยียบหัวศัตรูสีม่วงเพื่อกำจัด | ระวังหนามสีเทา!</p>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // ตัวแปรระบบเกม
    let score = 0;
    let currentLevel = 0;
    let gameWon = false;
    const gravity = 0.6;
    const friction = 0.8;

    // ระบบปุ่มกด
    const keys = { right: false, left: false, up: false };

    // ตัวละครผู้เล่น
    const player = {
        x: 50, y: 300, width: 30, height: 30, speed: 5, velX: 0, velY: 0, jumping: false, grounded: false
    };

    // ข้อมูลแต่ละด่าน (เพิ่มศัตรู และ หนาม)
    // ข้อมูลแต่ละด่าน (อัปเดตด่าน 2 ให้กระโดดถึงแล้ว)
    const levels = [
        {
            // ด่าน 1: แนะนำศัตรู
            spawn: { x: 50, y: 300 },
            goal: { x: 730, y: 300, width: 40, height: 50 },
            platforms: [
                { x: 0, y: 350, width: 800, height: 50 },
                { x: 300, y: 280, width: 100, height: 10 },
            ],
            coins: [
                { x: 340, y: 240, width: 20, height: 20, collected: false },
                { x: 500, y: 310, width: 20, height: 20, collected: false }
            ],
            enemies: [
                { x: 550, y: 320, width: 30, height: 30, speed: 2, minX: 450, maxX: 650, alive: true }
            ],
            spikes: []
        },
        {
            // ด่าน 2: แก้ไขให้มีแท่นบันไดกระโดดถึงได้แล้ว
            spawn: { x: 50, y: 300 },
            goal: { x: 730, y: 150, width: 40, height: 50 },
            platforms: [
                { x: 0, y: 350, width: 300, height: 50 }, 
                { x: 450, y: 350, width: 350, height: 50 },
                { x: 320, y: 250, width: 100, height: 10 }, 
                { x: 500, y: 280, width: 80, height: 10 }, // เพิ่มแท่นเหยียบใหม่
                { x: 620, y: 200, width: 100, height: 10 }  // ลดความสูงแท่นสุดท้ายลง
            ],
            coins: [
                { x: 360, y: 210, width: 20, height: 20, collected: false },
                { x: 640, y: 160, width: 20, height: 20, collected: false }
            ],
            enemies: [
                { x: 500, y: 320, width: 30, height: 30, speed: 1.5, minX: 450, maxX: 600, alive: true }
            ],
            spikes: [
                { x: 200, y: 320, width: 30, height: 30 }
            ]
        },
        {
            // ด่าน 3: ศัตรูและหนามเยอะขึ้น
            spawn: { x: 50, y: 300 },
            goal: { x: 50, y: 50, width: 40, height: 50 },
            platforms: [
                { x: 0, y: 350, width: 200, height: 50 },
                { x: 250, y: 280, width: 80, height: 10 },
                { x: 400, y: 220, width: 80, height: 10 },
                { x: 550, y: 160, width: 80, height: 10 },
                { x: 250, y: 100, width: 200, height: 10 },
                { x: 0, y: 100, width: 150, height: 10 }
            ],
            coins: [
                { x: 280, y: 240, width: 20, height: 20, collected: false },
                { x: 430, y: 180, width: 20, height: 20, collected: false },
                { x: 580, y: 120, width: 20, height: 20, collected: false },
                { x: 340, y: 60, width: 20, height: 20, collected: false }
            ],
            enemies: [
                { x: 350, y: 70, width: 30, height: 30, speed: 2, minX: 250, maxX: 420, alive: true }
            ],
            spikes: [
                { x: 120, y: 320, width: 30, height: 30 },
                { x: 150, y: 320, width: 30, height: 30 }
            ]
        }
    ];

    // โหลดข้อมูลด่านปัจจุบัน
    let currentPlatforms = [];
    let currentCoins = [];
    let currentEnemies = [];
    let currentSpikes = [];
    let currentGoal = {};

    function loadLevel(levelIndex) {
        if (levelIndex >= levels.length) {
            gameWon = true;
            return;
        }
        
        let levelData = levels[levelIndex];
        player.x = levelData.spawn.x;
        player.y = levelData.spawn.y;
        player.velX = 0;
        player.velY = 0;
        
        currentGoal = { ...levelData.goal };
        currentPlatforms = JSON.parse(JSON.stringify(levelData.platforms));
        currentCoins = JSON.parse(JSON.stringify(levelData.coins));
        currentEnemies = JSON.parse(JSON.stringify(levelData.enemies));
        currentSpikes = JSON.parse(JSON.stringify(levelData.spikes));
    }

    // ดักจับปุ่ม
    window.addEventListener("keydown", (e) => {
        if (e.code === "ArrowRight") keys.right = true;
        if (e.code === "ArrowLeft") keys.left = true;
        if (e.code === "ArrowUp" || e.code === "Space") keys.up = true;
    });
    window.addEventListener("keyup", (e) => {
        if (e.code === "ArrowRight") keys.right = false;
        if (e.code === "ArrowLeft") keys.left = false;
        if (e.code === "ArrowUp" || e.code === "Space") keys.up = false;
    });

    // ฟังก์ชันตรวจสอบการชน
    function checkCollision(rect1, rect2) {
        return (rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y);
    }

    function update() {
        if (gameWon) return;

        // --- ควบคุมตัวละคร ---
        if (keys.right) { if (player.velX < player.speed) player.velX++; }
        if (keys.left) { if (player.velX > -player.speed) player.velX--; }
        if (keys.up && player.grounded) {
            player.jumping = true;
            player.grounded = false;
            player.velY = -12;
        }

        player.velX *= friction;
        player.velY += gravity;
        player.x += player.velX;
        player.y += player.velY;

        if (player.x >= canvas.width - player.width) player.x = canvas.width - player.width;
        else if (player.x <= 0) player.x = 0;

        // ตกหลุมตาย
        if (player.y > canvas.height) {
            loadLevel(currentLevel); // เริ่มด่านใหม่
        }

        // --- ชนพื้นดิน ---
        player.grounded = false;
        for (let p of currentPlatforms) {
            if (player.x < p.x + p.width && player.x + player.width > p.x && 
                player.y + player.height > p.y && player.y + player.height < p.y + player.velY + 2) {
                player.grounded = true;
                player.jumping = false;
                player.y = p.y - player.height;
                player.velY = 0;
            }
        }

        // --- ชนเหรียญ ---
        for (let c of currentCoins) {
            if (!c.collected && checkCollision(player, c)) {
                c.collected = true;
                score += 10;
            }
        }

        // --- ระบบศัตรู (AI ขยับไปมา + การเหยียบ) ---
        for (let e of currentEnemies) {
            if (!e.alive) continue;

            // ศัตรูเดินไปมา
            e.x += e.speed;
            if (e.x <= e.minX || e.x + e.width >= e.maxX) {
                e.speed *= -1; // สลับทิศทาง
            }

            // ตรวจสอบการชนกับผู้เล่น
            if (checkCollision(player, e)) {
                // เช็คว่าผู้เล่นกำลัง "ตกลงมา" (velY > 0) และอยู่สูงกว่าตัวศัตรูหรือไม่ (การเหยียบ)
                if (player.velY > 0 && player.y + player.height - player.velY <= e.y + 10) {
                    e.alive = false; // ศัตรูตาย
                    player.velY = -8; // เด้งกระโดดนิดนึงเมื่อเหยียบโดน
                    score += 50; // ได้คะแนนพิเศษ
                } else {
                    // ถ้าเดินชนด้านข้าง = ผู้เล่นตาย เริ่มด่านใหม่
                    loadLevel(currentLevel);
                }
            }
        }

        // --- ระบบหนาม (ตายทันที) ---
        for (let s of currentSpikes) {
            // ลดขนาด Hitbox ของหนามลงนิดหน่อย เพื่อไม่ให้ตายง่ายเกินไป
            let spikeHitbox = { x: s.x + 5, y: s.y + 10, width: s.width - 10, height: s.height - 10 };
            if (checkCollision(player, spikeHitbox)) {
                loadLevel(currentLevel); // เริ่มด่านใหม่
            }
        }

        // --- เข้าเส้นชัย (ผ่านด่าน) ---
        if (checkCollision(player, currentGoal)) {
            currentLevel++;
            loadLevel(currentLevel);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameWon) {
            ctx.fillStyle = "#000";
            ctx.font = "40px Arial";
            ctx.fillText("🎉 คุณชนะแล้ว! 🎉", 250, 180);
            ctx.font = "20px Arial";
            ctx.fillText("คะแนนรวม: " + score, 330, 230);
            return;
        }

        // วาดประตูทางออก
        ctx.fillStyle = "#32CD32";
        ctx.fillRect(currentGoal.x, currentGoal.y, currentGoal.width, currentGoal.height);
        ctx.fillStyle = "#FFF";
        ctx.beginPath();
        ctx.arc(currentGoal.x + 10, currentGoal.y + 25, 4, 0, Math.PI * 2);
        ctx.fill();

        // วาดพื้น
        ctx.fillStyle = "#8B4513";
        for (let p of currentPlatforms) {
            ctx.fillRect(p.x, p.y, p.width, p.height);
            ctx.fillStyle = "#228B22";
            ctx.fillRect(p.x, p.y, p.width, 5);
            ctx.fillStyle = "#8B4513";
        }

        // วาดเหรียญ
        ctx.fillStyle = "#FFD700";
        for (let c of currentCoins) {
            if (!c.collected) {
                ctx.beginPath();
                ctx.arc(c.x + 10, c.y + 10, 10, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // วาดหนาม (สามเหลี่ยมสีเทา)
        ctx.fillStyle = "#A9A9A9";
        for (let s of currentSpikes) {
            ctx.beginPath();
            ctx.moveTo(s.x, s.y + s.height); // มุมซ้ายล่าง
            ctx.lineTo(s.x + s.width / 2, s.y); // ยอดแหลมตรงกลาง
            ctx.lineTo(s.x + s.width, s.y + s.height); // มุมขวาล่าง
            ctx.fill();
        }

        // วาดศัตรู (สีม่วง)
        for (let e of currentEnemies) {
            if (e.alive) {
                ctx.fillStyle = "#8A2BE2";
                ctx.fillRect(e.x, e.y, e.width, e.height);
                // วาดตาศัตรูให้ดูดุๆ
                ctx.fillStyle = "#FFF";
                ctx.fillRect(e.x + 5, e.y + 5, 5, 5);
                ctx.fillRect(e.x + 20, e.y + 5, 5, 5);
            }
        }

        // วาดตัวละครผู้เล่น
        ctx.fillStyle = "#FF4500";
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // วาด UI
        ctx.fillStyle = "#000";
        ctx.font = "20px Arial";
        ctx.fillText("ด่านที่: " + (currentLevel + 1), 20, 30);
        ctx.fillText("คะแนน: " + score, 20, 60);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    loadLevel(0);
    gameLoop();
</script>

</body>
</html>
