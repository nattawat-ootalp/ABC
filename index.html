<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมวิ่งหลบสิ่งกีดขวาง</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            margin-top: 50px;
        }
        canvas {
            border: 2px solid #333;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 { color: #333; }
    </style>
</head>
<body>

    <h2>เกมวิ่งหลบสิ่งกีดขวาง</h2>
    <p>กดปุ่ม <b>Spacebar</b> เพื่อกระโดด</p>
    
    <!-- พื้นที่สำหรับวาดเกม -->
    <canvas id="gameCanvas" width="600" height="200"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // กำหนดค่าตัวละคร (กล่องสีน้ำเงิน)
        let player = { x: 50, y: 150, width: 30, height: 30, dy: 0, gravity: 0.6, jumpPower: -10, isGrounded: true };

        // กำหนดค่าสิ่งกีดขวาง (กล่องสีแดง)
        let obstacle = { x: 600, y: 150, width: 30, height: 30, speed: 5 };

        let score = 0;
        let isGameOver = false;

        // ดักจับการกดปุ่ม Spacebar เพื่อกระโดด
        window.addEventListener("keydown", function(e) {
            if (e.code === "Space") {
                if (player.isGrounded && !isGameOver) {
                    player.dy = player.jumpPower;
                    player.isGrounded = false;
                }
                if (isGameOver) {
                    resetGame(); // เริ่มเกมใหม่ถ้า Game Over แล้วกด Spacebar
                }
            }
        });

        // ฟังก์ชันเริ่มเกมใหม่
        function resetGame() {
            obstacle.x = 600;
            obstacle.speed = 5;
            score = 0;
            player.y = 150;
            player.dy = 0;
            isGameOver = false;
            gameLoop();
        }

        // อัปเดตตำแหน่งต่างๆ ในเกม
        function update() {
            if (isGameOver) return;

            // ระบบแรงโน้มถ่วงของตัวละคร
            player.y += player.dy;
            player.dy += player.gravity;

            // ป้องกันไม่ให้ตัวละครตกทะลุพื้น
            if (player.y >= 150) {
                player.y = 150;
                player.dy = 0;
                player.isGrounded = true;
            }

            // เลื่อนสิ่งกีดขวางเข้ามาหาตัวละคร
            obstacle.x -= obstacle.speed;

            // ถ้ารอดจากสิ่งกีดขวางได้ ให้เพิ่มคะแนนและเพิ่มความเร็ว
            if (obstacle.x + obstacle.width < 0) {
                obstacle.x = canvas.width;
                score++;
                obstacle.speed += 0.3; // เกมจะยากขึ้นเรื่อยๆ
            }

            // ตรวจสอบการชนกัน (Collision Detection)
            if (player.x < obstacle.x + obstacle.width &&
                player.x + player.width > obstacle.x &&
                player.y < obstacle.y + obstacle.height &&
                player.y + player.height > obstacle.y) {
                isGameOver = true;
            }
        }

        // วาดองค์ประกอบต่างๆ ลงบนหน้าจอ
        function draw() {
            // ล้างหน้าจอเก่าทุกเฟรม
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดเส้นพื้นดิน
            ctx.fillStyle = "#888";
            ctx.fillRect(0, 180, canvas.width, 20);

            // วาดตัวละคร (สีน้ำเงิน)
            ctx.fillStyle = "#3498db";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // วาดสิ่งกีดขวาง (สีแดง)
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);

            // แสดงคะแนน
            ctx.fillStyle = "#333";
            ctx.font = "20px Arial";
            ctx.fillText("คะแนน: " + score, 10, 30);

            // แสดงข้อความตอนจบเกม
            if (isGameOver) {
                ctx.fillStyle = "black";
                ctx.font = "30px Arial";
                ctx.fillText("Game Over!", 215, 90);
                ctx.font = "20px Arial";
                ctx.fillText("กด Spacebar เพื่อเริ่มใหม่", 195, 130);
            }
        }

        // ลูปหลักของเกม (ทำงานซ้ำๆ อย่างรวดเร็ว)
        function gameLoop() {
            update();
            draw();
            if (!isGameOver) {
                requestAnimationFrame(gameLoop); // เรียกตัวเองซ้ำเพื่อสร้างเฟรมเรต
            }
        }

        // สั่งให้เกมเริ่มทำงาน
        gameLoop();
    </script>
</body>
</html>
