<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมวิ่งเก็บเหรียญ 2D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background-color: #87CEEB; /* สีฟ้าท้องฟ้า */
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // ตัวแปรระบบเกม
    let score = 0;
    const gravity = 0.6;
    const friction = 0.8;

    // ระบบปุ่มกด
    const keys = {
        right: false,
        left: false,
        up: false
    };

    // ตัวละครผู้เล่น
    const player = {
        x: 50,
        y: 300,
        width: 30,
        height: 30,
        speed: 5,
        velX: 0,
        velY: 0,
        jumping: false,
        grounded: false
    };

    // พื้นดินและแท่นกระโดด
    const platforms = [
        { x: 0, y: 350, width: 800, height: 50 }, // พื้นหลัก
        { x: 200, y: 250, width: 100, height: 10 },
        { x: 400, y: 180, width: 100, height: 10 },
        { x: 600, y: 100, width: 100, height: 10 }
    ];

    // เหรียญ
    let coins = [
        { x: 235, y: 210, width: 20, height: 20, collected: false },
        { x: 435, y: 140, width: 20, height: 20, collected: false },
        { x: 635, y: 60, width: 20, height: 20, collected: false },
        { x: 700, y: 310, width: 20, height: 20, collected: false }
    ];

    // ดักจับการกดปุ่ม
    window.addEventListener("keydown", function(e) {
        if (e.code === "ArrowRight") keys.right = true;
        if (e.code === "ArrowLeft") keys.left = true;
        if (e.code === "ArrowUp" || e.code === "Space") keys.up = true;
    });

    window.addEventListener("keyup", function(e) {
        if (e.code === "ArrowRight") keys.right = false;
        if (e.code === "ArrowLeft") keys.left = false;
        if (e.code === "ArrowUp" || e.code === "Space") keys.up = false;
    });

    // ฟังก์ชันตรวจสอบการชนกัน (Collision Detection)
    function checkCollision(rect1, rect2) {
        return (rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y);
    }

    // ฟังก์ชันอัปเดตสถานะเกม (Physics & Logic)
    function update() {
        // การเคลื่อนที่ซ้าย-ขวา
        if (keys.right) { if (player.velX < player.speed) player.velX++; }
        if (keys.left) { if (player.velX > -player.speed) player.velX--; }

        // การกระโดด
        if (keys.up && player.grounded) {
            player.jumping = true;
            player.grounded = false;
            player.velY = -12; // ความแรงในการกระโดด
        }

        // คำนวณแรงเสียดทานและแรงโน้มถ่วง
        player.velX *= friction;
        player.velY += gravity;

        player.x += player.velX;
        player.y += player.velY;

        // ไม่ให้วิ่งทะลุขอบจอ
        if (player.x >= canvas.width - player.width) player.x = canvas.width - player.width;
        else if (player.x <= 0) player.x = 0;

        // ตรวจสอบการชนกับพื้น (Platform Collision)
        player.grounded = false;
        for (let i = 0; i < platforms.length; i++) {
            let p = platforms[i];
            
            // เช็คว่าผู้เล่นตกลงมาเหยียบแท่นหรือไม่
            if (player.x < p.x + p.width && 
                player.x + player.width > p.x && 
                player.y + player.height > p.y && 
                player.y + player.height < p.y + player.velY + 2) {
                
                player.grounded = true;
                player.jumping = false;
                player.y = p.y - player.height;
                player.velY = 0;
            }
        }

        // ตรวจสอบการเก็บเหรียญ
        for (let i = 0; i < coins.length; i++) {
            let c = coins[i];
            if (!c.collected && checkCollision(player, c)) {
                c.collected = true;
                score += 10; // ได้เหรียญละ 10 คะแนน
            }
        }
    }

    // ฟังก์ชันวาดกราฟิกบนหน้าจอ (Render)
    function draw() {
        // เคลียร์หน้าจอเก่าทิ้ง
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // วาดพื้นดินและแท่นกระโดด (สีเขียว)
        ctx.fillStyle = "#228B22";
        for (let i = 0; i < platforms.length; i++) {
            ctx.fillRect(platforms[i].x, platforms[i].y, platforms[i].width, platforms[i].height);
        }

        // วาดเหรียญ (สีทอง)
        ctx.fillStyle = "#FFD700";
        for (let i = 0; i < coins.length; i++) {
            if (!coins[i].collected) {
                ctx.beginPath();
                ctx.arc(coins[i].x + 10, coins[i].y + 10, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            }
        }

        // วาดตัวละครผู้เล่น (สีแดง)
        ctx.fillStyle = "#FF4500";
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // วาดคะแนน
        ctx.fillStyle = "#000";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + score, 20, 30);
    }

    // วงจรการทำงานหลักของเกม (Game Loop)
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop); // สั่งให้รันเฟรมถัดไปเรื่อยๆ
    }

    // เริ่มเกม
    gameLoop();
</script>

</body>
</html>
